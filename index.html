<!DOCTYPE html>

<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
                user-select: none;
            }

            .container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                background-color: #bdaa90;
            }

            .title-box {
                width: 60%;
                max-width: 600px;
                margin-top: 2em;
            }

            .title-img {
                width: 100%;
                height: auto;
                display: block;
            }

            .text-box {
                width: 100%;
                max-width: 800px;
                flex: 1;
                display: flex;
            }

            .cat-img {
                width: 100%;
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding-top: 0.3em;
                box-sizing: border-box;
                text-align: center;
                color: white;
                font-size: 80px;
                -webkit-text-stroke: 3px black;
            }

            #p {
                background-image: url("imgs/p.png");
                background-position: center bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }

            #op {
                background-image: url("imgs/op.png");
                background-position: center bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="title-box">
                <img src="imgs/popcat.svg" alt="POPCAT CLASSIC" class="title-img">
            </div>
            <div class="text-box">
                <div class="cat-img" id="p">0</div>
            </div>
        </div>

        <script>
            let count = 0;
            const countElement = document.getElementById("p");
            const popSound = new Audio("pops/pop1.mp3");

            function openCat() {
                countElement.id = "op";
                popSound.currentTime = 0;
                popSound.play();
            }

            function closeCat() {
                countElement.id = "p";
            }

            function incrementCount() {
                count += 1;
                countElement.textContent = count;
                console.log(count);
            }

            function isInteractionKey(event) {
                return event.code === "Space" || event.key === "Enter";
            }

            function handleKeyDown(event) {
                if (!isInteractionKey(event) || event.repeat) {
                    return;
                }
                event.preventDefault();
                openCat();
                incrementCount();
            }

            function handleKeyUp(event) {
                if (!isInteractionKey(event)) {
                    return;
                }
                event.preventDefault();
                setTimeout(closeCat, 25);
            }

            countElement.addEventListener("mousedown", openCat);
            countElement.addEventListener("mouseup", () => {
                setTimeout(closeCat, 25);
            });
            countElement.addEventListener("mouseleave", closeCat);
            countElement.addEventListener("click", incrementCount);
            window.addEventListener("keydown", handleKeyDown);
            window.addEventListener("keyup", handleKeyUp);
        </script>
    </body>
</html>
